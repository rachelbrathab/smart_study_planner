<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocked by Focus Mode</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #173042;
      --muted: #567085;
      --accent: #1f5f5b;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #dfeef0, var(--bg));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    .card {
      width: min(560px, calc(100vw - 32px));
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(23, 48, 66, 0.14);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.5rem;
    }

    p {
      margin: 8px 0;
      line-height: 1.5;
      color: var(--muted);
    }

    .domain {
      color: var(--accent);
      font-weight: 700;
    }

    button {
      margin-top: 18px;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Stay focused, you are doing great</h1>
    <p>
      <span class="domain" id="domainName">This domain</span>
      is paused for now so you can protect your study momentum.
    </p>
    <p id="detailText">Finish your current study block, then come back guilt-free when Focus Mode is off.</p>
    <button id="allowOnceBtn" type="button" hidden>Allow this video once</button>
    <button id="closeTabBtn" type="button">Close this tab</button>
  </main>

  <script src="blocked.js"></script>
</body>
</html>
